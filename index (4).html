// ─── STORAGE ─────────────────────────────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem('chudd')||'{}')}catch(e){return{}}}
function save(d){try{localStorage.setItem('chudd',JSON.stringify(d))}catch(e){}}

// ─── TIME ─────────────────────────────────────────────────────────────────────
function msLeft(){var n=new Date(),m=new Date(n);m.setHours(24,0,0,0);return m-n;}
function today(){return new Date().toISOString().slice(0,10);}
function fmt(ms){
  if(ms<=0)return'00:00:00';
  var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}
function dayLbl(dk){
  var t=today(),yd=new Date();yd.setDate(yd.getDate()-1);
  if(dk===t)return'Today';
  if(dk===yd.toISOString().slice(0,10))return'Yesterday';
  return new Date(dk+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function get(key){return S.store[key]||0;}

        '<div style="font-size:12px;color:#333;">Every day tracked. Every day counts.</div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;">'+
        PHASES.map(function(ph2,i){
          var act=S.histPh===i;
          return '<button class="btn" onclick="switchHistPh('+i+')" style="flex-shrink:0;padding:5px 12px;border-radius:100px;background:'+(act?'linear-gradient(135deg,'+ph2.from+','+ph2.to+')':'#1C1C26')+';color:'+(act?'#fff':'#444')+';font-size:10px;font-weight:800;">'+ph2.lbl+'</button>';
        }).join('')+
      '</div>';

    var hp=PHASES[S.histPh];
    var hist=[];
    for(var i=0;i<30;i++){
      var d=new Date();d.setDate(d.getDate()-i);
      var dk=d.toISOString().slice(0,10);
      var c=getObj('c'+S.histPh+'_'+dk);
      var ct=Object.values(c).filter(Boolean).length;
      if(ct>0||dk===td) hist.push({date:dk,done:ct,total:hp.tasks.length,pct:Math.round(ct/hp.tasks.length*100),checked:c});
    }

    if(hist.length===0){
      html+='<div style="text-align:center;padding:40px 20px;"><div style="font-size:44px;margin-bottom:12px;">📭</div><div style="font-size:14px;font-weight:700;color:#444;">No history yet</div><div style="font-size:12px;color:#2A2A3A;margin-top:4px;">Start checking off tasks!</div></div>';
    } else {
      hist.forEach(function(day){
        var isToday=day.date===td;
        var perfect=day.pct===100;
        html+=
          '<div style="background:#13131E;border-radius:16px;padding:14px 16px;margin-bottom:10px;border:1px solid '+(perfect?hp.from+'60':isToday?hp.from+'30':'#1E1E2A')+';">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+
              '<div>'+
                '<div style="font-size:14px;font-weight:800;color:'+(isToday?hp.from:'#DDD')+';">'+dayLbl(day.date)+'</div>'+
                '<div style="font-size:10px;color:#2A2A3A;margin-top:1px;">'+day.date+'</div>'+
              '</div>'+
              '<div style="display:flex;align-items:center;gap:8px;">'+
                (perfect?'<span style="font-size:18px;">🏆</span>':'')+
                '<div style="text-align:right;">'+
                  '<div style="font-size:20px;font-weight:800;color:'+(perfect?'#4ADE80':hp.from)+';line-height:1;">'+day.pct+'%</div>'+
                  '<div style="font-size:10px;color:#2A2A3A;">'+day.done+'/'+day.total+'</div>'+
                '</div>'+
              '</div>'+
            '</div>'+
            '<div style="height:4px;background:#1C1C26;border-radius:10px;margin-bottom:10px;">'+
              '<div style="height:100%;width:'+day.pct+'%;background:'+(perfect?'linear-gradient(90deg,#4ADE80,#22C55E)':'linear-gradient(90deg,'+hp.from+','+hp.to+')')+';border-radius:10px;"></div>'+
            '</div>'+
            '<div style="display:flex;flex-wrap:wrap;gap:5px;">'+
              hp.tasks.map(function(task,ti){
                return '<div style="width:30px;height:30px;border-radius:8px;background:'+(day.checked[ti]?'linear-gradient(135deg,'+hp.from+'40,'+hp.to+'40)':'#0C0C0F')+';display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid '+(day.checked[ti]?hp.from+'50':'#1C1C26')+';opacity:'+(day.checked[ti]?1:0.3)+';">'+task.e+'</div>';
              }).join('')+
            '</div>'+
          '</div>';
      });
    }
    html+='</div>';
  }

  else if(S.tab==='ai'){
    html+='<div style="padding:16px 14px 80px;">';
    html+=
      '<div style="margin-bottom:20px;">'+
        '<div style="font-size:22px;font-weight:800;line-height:1.2;">AI Skills That<br><span style="color:'+p.from+';">Get You Hired</span></div>'+
        '<div style="font-size:12px;color:#333;margin-top:4px;">Learn these. Build. Put them on your resume.</div>'+
      '</div>';
    var cats=[];
    AI_SKILLS.forEach(function(s){if(cats.indexOf(s.cat)<0)cats.push(s.cat);});
    cats.forEach(function(cat){
      var cs=AI_SKILLS.filter(function(s){return s.cat===cat;});
      var cc=cs[0].col;
      html+='<div style="margin-bottom:22px;"><div style="font-size:11px;font-weight:800;color:'+cc+';letter-spacing:.1em;margin-bottom:8px;">'+cat.toUpperCase()+'</div>';
      cs.forEach(function(sk,si){
        var key=cat+si;
        var open=S.openSkill===key;
        html+=
          '<div class="btn" onclick="toggleSkill(\''+key+'\')" style="background:#13131E;border-radius:14px;padding:13px 14px;margin-bottom:7px;border:1px solid '+(open?cc+'45':'#1E1E2A')+';'+(open?'box-shadow:0 4px 20px '+cc+'18;':'')+';display:block;width:100%;text-align:left;">'+
            '<div style="display:flex;align-items:center;gap:10px;">'+
              '<div style="width:38px;height:38px;border-radius:11px;background:'+cc+'22;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;">'+sk.icon+'</div>'+
              '<div style="flex:1;">'+
                '<div style="font-size:13px;font-weight:700;color:#DEDEE8;">'+sk.name+'</div>'+
                '<div style="font-size:11px;color:#333;">'+sk.desc+'</div>'+
              '</div>'+
              '<div style="color:#2A2A3A;font-size:18px;transform:'+(open?'rotate(180deg)':'none')+';transition:transform .2s;">⌄</div>'+
            '</div>'+
            (open?
              '<div style="margin-top:12px;padding:10px 12px;background:'+cc+'12;border-radius:10px;border-left:3px solid '+cc+';">'+
                '<div style="font-size:9px;color:'+cc+';font-weight:800;letter-spacing:.2em;margin-bottom:4px;">WHY IT MATTERS</div>'+
                '<div style="font-size:12px;color:#555;line-height:1.6;">'+sk.why+'</div>'+
              '</div>':'')+
          '</div>';
      });
      html+='</div>';
    });
    html+=
      '<div style="padding:16px;border-radius:16px;background:linear-gradient(135deg,'+p.from+'14,'+p.to+'06);border:1px solid '+p.from+'22;margin-bottom:8px;">'+
        '<div style="font-size:12px;font-weight:800;color:'+p.from+';margin-bottom:12px;">🔗 Start Here — All Free</div>'+
        [['learnprompting.org','Free prompt engineering'],['cursor.com','Start vibe coding today'],['Andrej Karpathy (YouTube)','How AI actually works'],['The Rundown AI','Daily AI news, 5 min'],['freeCodeCamp AI path','Beginner friendly, free']].map(function(pair){
          return '<div style="display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;"><div style="width:5px;height:5px;border-radius:50%;background:'+p.from+';margin-top:6px;flex-shrink:0;"></div><div><div style="font-size:12px;font-weight:700;color:#DDD;">'+pair[0]+'</div><div style="font-size:11px;color:#333;">'+pair[1]+'</div></div></div>';
        }).join('')+
      '</div>';
    html+='</div>';
  }

  else if(S.tab==='stats'){
    html+='<div style="padding:16px 14px 80px;">';
    html+='<div style="font-size:22px;font-weight:800;margin-bottom:18px;">Your <span style="color:'+p.from+';">Stats</span></div>';
    PHASES.forEach(function(ph2,i){
      var px=get('x'+i),pl=Math.floor(px/1000)+1,ps=get('s'+i),pp=((px%1000)/1000)*100;
      var hist2=[];
      for(var d=0;d<30;d++){var dt=new Date();dt.setDate(dt.getDate()-d);var dk=dt.toISOString().slice(0,10);var c=getObj('c'+i+'_'+dk);var ct=Object.values(c).filter(Boolean).length;if(ct>0)hist2.push(ct);}
      var perfect2=0;
      for(var d2=0;d2<30;d2++){var dt2=new Date();dt2.setDate(dt2.getDate()-d2);var dk2=dt2.toISOString().slice(0,10);var c2=getObj('c'+i+'_'+dk2);if(Object.values(c2).filter(Boolean).length===ph2.tasks.length)perfect2++;}
      html+=
        '<div style="background:#13131E;border-radius:18px;padding:16px;margin-bottom:12px;border:1px solid '+(i===S.ph?ph2.from+'45':'#1E1E2A')+';">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+
            '<div><div style="font-size:15px;font-weight:800;">'+ph2.title+'</div><div style="font-size:11px;color:#333;">'+ph2.dur+'</div></div>'+
            '<div style="text-align:right;"><div style="font-size:22px;font-weight:800;color:'+ph2.from+';line-height:1;">Lvl '+pl+'</div><div style="font-size:10px;color:#333;">'+px+' XP</div></div>'+
          '</div>'+
          '<div style="height:4px;background:#1C1C26;border-radius:10px;margin-bottom:12px;">'+
            '<div style="height:100%;width:'+pp+'%;background:linear-gradient(90deg,'+ph2.from+','+ph2.to+');border-radius:10px;"></div>'+
          '</div>'+
          '<div style="display:flex;gap:8px;">'+
            [['🔥',ps,'STREAK',ps>0],['🏆',perfect2,'PERFECT',perfect2>0],['⚡',px,'TOTAL XP',true]].map(function(arr){
              return '<div style="flex:1;background:#0C0C0F;border-radius:12px;padding:8px 4px;text-align:center;"><div style="font-size:16px;">'+arr[0]+'</div><div style="font-size:12px;font-weight:800;color:'+(arr[3]?ph2.from:'#2A2A3A')+';line-height:1.2;margin-top:2px;">'+arr[1]+'</div><div style="font-size:7px;color:#2A2A3A;letter-spacing:.1em;margin-top:2px;">'+arr[2]+'</div></div>';
            }).join('')+
          '</div>'+
        '</div>';
    });
    html+=
      '<div style="padding:16px;border-radius:16px;background:#13131E;border:1px solid #1E1E2A;">'+
        '<div style="font-size:12px;font-weight:800;margin-bottom:8px;">📱 Add to Home Screen</div>'+
        '<div style="font-size:12px;color:#444;line-height:1.8;"><strong style="color:#666;">iPhone Safari:</strong> Tap Share (□↑) → "Add to Home Screen"<br><strong style="color:#666;">Android Chrome:</strong> Tap ⋮ → "Add to Home Screen"</div>'+
      '</div>';
    html+='</div>';
  }

  document.getElementById('content').innerHTML=html;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function switchPhase(i){S.ph=i;S.tab='today';render();}
function switchTab(t){S.tab=t;render();}
function switchHistPh(i){S.histPh=i;render();}
function toggleSkill(k){S.openSkill=S.openSkill===k?null:k;render();}

function toggleTask(i){
  var p=PHASES[S.ph],td=today();
  var checked=getObj('c'+S.ph+'_'+td);
  var was=!!checked[i];
  checked=Object.assign({},checked);
  checked[i]=!was;
  var prevXP=get('x'+S.ph);
  var newXP=Math.max(0,prevXP+(was?-p.tasks[i].xp:p.tasks[i].xp));
  var allDone=p.tasks.every(function(_,j){return !!checked[j];});
  var yd=new Date();yd.setDate(yd.getDate()-1);
  var yk=yd.toISOString().slice(0,10);
  var yc=getObj('c'+S.ph+'_'+yk);
  var yad=p.tasks.every(function(_,j){return !!yc[j];});
  var streak=get('s'+S.ph);
  var newStreak=allDone?(yad?streak+1:1):streak;

  var ns=Object.assign({},S.store);
  ns['c'+S.ph+'_'+td]=checked;
  ns['x'+S.ph]=newXP;
  ns['s'+S.ph]=newStreak;
  S.store=ns;
  save(ns);

  // Level up check
  if(!was && Math.floor(newXP/1000)>Math.floor(prevXP/1000)){showLevelUp(p);}

  render();
}

function showLevelUp(p){
  var el=document.createElement('div');
  el.style.cssText='position:fixed;top:50%;left:50%;z-index:9999;background:linear-gradient(135deg,'+p.from+','+p.to+');border-radius:24px;padding:28px 44px;text-align:center;animation:lvlup 2.8s ease forwards;box-shadow:0 0 80px '+p.from+'90;pointer-events:none;';
  el.innerHTML='<div style="font-size:44px;">⚡</div><div style="font-size:28px;font-weight:800;">LEVEL UP!</div><div style="font-size:14px;opacity:.8;margin-top:4px;">Keep going.</div>';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},2800);
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
setInterval(function(){
  S.ms=msLeft();
  var el=document.querySelector('[data-timer]');
  if(el) el.textContent=fmt(S.ms);
  else render(); // fallback full re-render once per second is fine for static HTML
},1000);

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
